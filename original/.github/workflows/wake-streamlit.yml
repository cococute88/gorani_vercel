name: Wake Streamlit App

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: read

concurrency:
  group: wake-streamlit
  cancel-in-progress: true

jobs:
  wake-streamlit:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Wake Streamlit app
        env:
          STREAMLIT_APP_URL: "https://cococute88-opt-gorani-finance-v2-mmdtk57yfrbq4853tl3x4k.streamlit.app/"
          EXPECTED_READY_TEXT: "GORANI_FINANCE_APP_READY"
          MAX_WAIT_SECONDS: "1200"
          POLL_SECONDS: "25"
          SCREENSHOT_PATH: "artifacts/streamlit-wakeup.png"
          HTML_PATH: "artifacts/streamlit-wakeup.html"
        run: |
          mkdir -p artifacts
          python scripts/wake_streamlit.py

      - name: Upload wakeup artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: streamlit-wakeup-artifacts
          path: artifacts/
          if-no-files-found: warn
